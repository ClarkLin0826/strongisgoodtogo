<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriLens - 熱量與營養素追蹤</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/vegetarian-food.png">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .hidden { display: none !important; }
    /* Loading 動畫 */
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #4f46e5;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="text-slate-800">

  <div id="loading-overlay" class="fixed inset-0 bg-slate-900/50 z-50 flex flex-col items-center justify-center hidden">
    <div class="loader mb-4"></div>
    <p id="loading-text" class="text-white font-medium">處理中...</p>
  </div>

  <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-xl relative overflow-hidden">
    
    <div id="auth-view" class="p-6 h-screen flex flex-col justify-center">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-indigo-600 mb-2">NutriLens</h1>
        <p class="text-slate-500 text-sm">您的智能熱量與營養素管家</p>
      </div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">帳號 (Username)</label>
          <input type="text" id="login-username" required class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">密碼</label>
          <input type="password" id="login-password" required class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
          <div class="text-right mt-1">
            <a href="#" id="go-to-forgot" class="text-xs text-indigo-500 hover:underline">忘記密碼？</a>
          </div>
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">登入</button>
        <p class="text-center text-sm text-slate-500 mt-4">
          還沒有帳號？ <a href="#" id="go-to-register" class="text-indigo-600 font-medium hover:underline">立即註冊</a>
        </p>
      </form>

      <form id="forgot-form" class="space-y-4 hidden">
        <div class="text-center mb-4">
          <h2 class="text-xl font-bold text-slate-800">重設密碼</h2>
          <p class="text-xs text-slate-500 mt-1">請輸入您註冊時的 Email，我們將寄發新密碼信件給您。</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">註冊 Email</label>
          <input type="email" id="forgot-email" required class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">發送重設信件</button>
        <p class="text-center text-sm text-slate-500 mt-4">
          <a href="#" id="go-to-login-from-forgot" class="text-indigo-600 font-medium hover:underline">返回登入</a>
        </p>
      </form>

      <form id="register-form" class="space-y-4 hidden max-h-[85vh] overflow-y-auto overflow-x-hidden p-1">
        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">自訂帳號 (Username)</label>
            <input type="text" id="reg-username" required class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">聯絡 Email (用於忘記密碼)</label>
            <input type="email" id="reg-email" required class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">密碼</label>
            <input type="password" id="reg-password" required class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">性別</label>
            <select id="reg-gender" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none">
              <option value="male">男性</option>
              <option value="female">女性</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">年齡</label>
            <input type="number" id="reg-age" required min="10" max="120" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">身高 (cm)</label>
            <input type="number" id="reg-height" required min="100" max="250" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">體重 (kg)</label>
            <input type="number" id="reg-weight" required min="30" max="200" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">活動量</label>
            <select id="reg-activity" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none">
              <option value="1.2">久坐 (幾乎不運動)</option>
              <option value="1.375">輕度活動 (每週運動 1-3 天)</option>
              <option value="1.55">中度活動 (每週運動 3-5 天)</option>
              <option value="1.725">高度活動 (每週運動 6-7 天)</option>
            </select>
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">目標</label>
            <select id="reg-goal" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none">
              <option value="maintain">維持體重</option>
              <option value="fat_loss">減脂</option>
              <option value="muscle_gain">增肌</option>
            </select>
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">帳號方案 (鎖定中)</label>
            <select id="reg-plan" class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-slate-100 text-slate-400 font-medium cursor-not-allowed" disabled>
              <option value="Free" selected>Free (免費版)</option>
              <option value="Premium">Premium (進階版，需開通)</option>
            </select>
          </div>
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition mt-4">註冊並計算 TDEE</button>
        <p class="text-center text-sm text-slate-500 mt-4">
          已有帳號？ <a href="#" id="go-to-login" class="text-indigo-600 font-medium hover:underline">返回登入</a>
        </p>
      </form>
    </div>

    <div id="dashboard-view" class="hidden flex flex-col h-screen bg-slate-50">
      <header class="bg-white p-4 border-b border-slate-200 flex justify-between items-center sticky top-0 z-10">
        <div>
          <h2 class="text-xl font-black text-indigo-600">NutriLens</h2>
          <p id="user-greeting" class="text-xs text-slate-500">Hi, User</p>
        </div>
        <div class="flex items-center gap-3">
          <input type="date" id="date-selector" class="text-sm border border-slate-300 rounded px-2 py-1 outline-none">
          <button id="btn-logout" class="text-sm text-slate-400 hover:text-slate-600">登出</button>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto p-4 pb-24 space-y-6">
        
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
          <div class="flex justify-between items-end mb-4">
            <div>
              <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">剩餘熱量</p>
              <p class="text-4xl font-black text-slate-800"><span id="cals-remaining">0</span> <span class="text-base font-medium text-slate-400">kcal</span></p>
            </div>
            <div class="text-right">
              <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">目標</p>
              <p class="text-lg font-bold text-indigo-600" id="cals-target">0</p>
            </div>
          </div>
          
          <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden mb-4">
            <div id="cals-progress" class="h-full bg-indigo-500 transition-all duration-500" style="width: 0%"></div>
          </div>

          <div class="flex justify-between text-sm">
            <div class="flex items-center gap-2">
              <div class="w-2 h-2 rounded-full bg-emerald-400"></div>
              <span class="text-slate-500">攝取: <strong class="text-slate-800" id="cals-in">0</strong></span>
            </div>
            <div class="flex items-center gap-2">
              <div class="w-2 h-2 rounded-full bg-orange-400"></div>
              <span class="text-slate-500">消耗: <strong class="text-slate-800" id="cals-out">0</strong></span>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
          <div class="bg-white rounded-xl p-3 shadow-sm border border-slate-100 text-center">
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">蛋白質</p>
            <p class="text-lg font-bold text-blue-500"><span id="macro-protein">0</span>g</p>
          </div>
          <div class="bg-white rounded-xl p-3 shadow-sm border border-slate-100 text-center">
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">碳水</p>
            <p class="text-lg font-bold text-amber-500"><span id="macro-carbs">0</span>g</p>
          </div>
          <div class="bg-white rounded-xl p-3 shadow-sm border border-slate-100 text-center">
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">脂肪</p>
            <p class="text-lg font-bold text-rose-500"><span id="macro-fat">0</span>g</p>
          </div>
        </div>

        <div>
          <h3 class="font-bold text-slate-800 mb-3">今日紀錄</h3>
          <div id="logs-container" class="space-y-3">
            <p class="text-sm text-slate-400 text-center py-4">尚無紀錄，點擊下方按鈕新增！</p>
          </div>
        </div>
      </main>

      <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-white via-white to-transparent pb-6">
        <div class="flex gap-2">
          <button id="btn-open-diet" class="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition flex items-center justify-center gap-2">
            <span>+ 記飲食</span>
          </button>
          <button id="btn-open-ai" class="flex-1 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-pink-200 hover:opacity-90 transition flex items-center justify-center gap-2">
            <span>✨ AI 拍照</span>
          </button>
        </div>
      </div>
    </div>

    <div id="diet-modal" class="fixed inset-0 bg-slate-900/50 z-50 hidden flex flex-col justify-end">
      <div class="bg-white rounded-t-3xl p-6">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-lg font-bold text-slate-800">新增飲食紀錄</h3>
          <button id="btn-close-diet" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
        </div>
        <form id="add-diet-form" class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div class="col-span-2">
              <label class="block text-xs font-medium text-slate-500 mb-1">餐別</label>
              <select id="diet-meal" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm outline-none">
                <option value="Breakfast">早餐</option>
                <option value="Lunch">午餐</option>
                <option value="Dinner">晚餐</option>
                <option value="Snack">點心</option>
              </select>
            </div>
            <div class="col-span-2" id="food-select-container">
              <label class="block text-xs font-medium text-slate-500 mb-1">大分類</label>
              <select id="diet-category" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm outline-none mb-3">
                <option value="" disabled selected>載入資料庫中...</option>
              </select>
              
              <div id="food-dropdown-wrapper">
                <label class="block text-xs font-medium text-slate-500 mb-1">食物名稱</label>
                <select id="diet-food" disabled class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm outline-none">
                  <option value="" disabled selected>請先選擇大分類...</option>
                </select>
              </div>
            </div>
            
            <div class="col-span-2 hidden" id="custom-food-container">
              <label class="block text-xs font-medium text-slate-500 mb-1">食物名稱 (手動輸入)</label>
              <input type="text" id="diet-name" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm outline-none">
            </div>

            <div class="col-span-2">
              <label class="block text-xs font-medium text-slate-500 mb-1">輸入份量</label>
              <div class="flex items-center gap-2">
                <input type="number" id="diet-amount-input" step="0.1" required class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm outline-none text-right placeholder-slate-300" placeholder="0">
                <span id="diet-unit-label" class="text-sm font-medium text-slate-500 whitespace-nowrap w-8">-</span>
              </div>
              <input type="hidden" id="diet-amount">
            </div>
            
            <div>
              <label class="block text-xs font-medium text-slate-500 mb-1">熱量 (kcal)</label>
              <input type="number" id="diet-cals" required readonly class="w-full px-3 py-2 border border-slate-200 bg-slate-50 text-slate-500 rounded-lg text-sm outline-none transition-colors">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-500 mb-1">蛋白質 (g)</label>
              <input type="number" id="diet-pro" required readonly class="w-full px-3 py-2 border border-slate-200 bg-slate-50 text-slate-500 rounded-lg text-sm outline-none transition-colors">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-500 mb-1">碳水 (g)</label>
              <input type="number" id="diet-carb" required readonly class="w-full px-3 py-2 border border-slate-200 bg-slate-50 text-slate-500 rounded-lg text-sm outline-none transition-colors">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-500 mb-1">脂肪 (g)</label>
              <input type="number" id="diet-fat" required readonly class="w-full px-3 py-2 border border-slate-200 bg-slate-50 text-slate-500 rounded-lg text-sm outline-none transition-colors">
            </div>
          </div>
          <input type="hidden" id="diet-is-ai" value="false">
          <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl mt-2">儲存紀錄</button>
        </form>
      </div>
    </div>

    <div id="ai-modal" class="fixed inset-0 bg-slate-900/50 z-50 hidden flex flex-col justify-end">
      <div class="bg-white rounded-t-3xl p-6">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600">✨ AI 智能辨識</h3>
          <button id="btn-close-ai" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
        </div>
        <div class="space-y-4 text-center">
          <p class="text-sm text-slate-500 mb-4">上傳食物照片，讓 AI 幫您估算熱量與營養素！</p>
          
          <div class="border-2 border-dashed border-pink-300 rounded-2xl p-8 bg-pink-50 relative">
            <input type="file" id="ai-image-input" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
            <div id="ai-preview-container" class="pointer-events-none">
              <span class="text-4xl mb-2 block">📸</span>
              <span class="text-sm font-bold text-pink-600">點擊拍照或上傳圖片</span>
            </div>
            <img id="ai-image-preview" class="hidden w-full h-40 object-cover rounded-xl mt-2 pointer-events-none">
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
